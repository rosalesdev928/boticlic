<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotiClic - Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 45px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 { font-size: 30px; color: #1b5e20; font-weight: 700; }
        .logo p { color: #888; font-size: 14px; margin-top: 4px; }
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            color: #888;
            transition: all 0.2s;
        }
        .tab-btn.activo {
            background: white;
            color: #1b5e20;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-section { display: none; }
        .form-section.activo { display: block; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #2e7d32; }
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1b5e20; }
        .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
        .error-box {
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .success-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .volver {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .volver a { color: #2e7d32; font-weight: 600; text-decoration: none; }
        .volver a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <h1>💊 BotiClic</h1>
        <p>Tu farmacia digital de confianza</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn activo" onclick="cambiarTab('login', this)">Iniciar Sesión</button>
        <button class="tab-btn" onclick="cambiarTab('registro', this)">Crear Cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section activo" id="secLogin">
        <div class="error-box" id="loginError"></div>
        <div class="success-box" id="loginSuccess"></div>
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com"
               onkeypress="if(event.key==='Enter') iniciarSesion()">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••"
               onkeypress="if(event.key==='Enter') iniciarSesion()">
        <button class="btn-primary" id="btnLogin" onclick="iniciarSesion()">
            Iniciar Sesión
        </button>
    </div>

    <!-- REGISTRO -->
    <div class="form-section" id="secRegistro">
        <div class="error-box" id="regError"></div>
        <div class="success-box" id="regSuccess"></div>
        <label>Nombre completo</label>
        <input type="text" id="regNombre" placeholder="Juan Pérez">
        <label>Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="tu@email.com">
        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">
        <button class="btn-primary" id="btnRegistro" onclick="registrarse()">
            Crear Cuenta
        </button>
    </div>

    <div class="volver">
        <a href="/index.html">← Volver a la tienda</a>
    </div>
</div>

<script>
    const API = 'http://localhost:8081/api';

    // Si ya hay sesión activa, redirigir
    window.onload = function() {
        const token = localStorage.getItem('token');
        const rol   = localStorage.getItem('rol');
        const usuario = localStorage.getItem('usuario');
        if (token) {
            const rolReal = rol || (usuario ? JSON.parse(usuario).rol : null);
            if (rolReal) redirigirSegunRol(rolReal);
        }
    };

    function cambiarTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('activo'));
        btn.classList.add('activo');
        document.getElementById(tab === 'login' ? 'secLogin' : 'secRegistro').classList.add('activo');
    }

    async function iniciarSesion() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errEl    = document.getElementById('loginError');
        const sucEl    = document.getElementById('loginSuccess');
        const btn      = document.getElementById('btnLogin');
        errEl.style.display = 'none';
        sucEl.style.display = 'none';

        if (!email || !password) {
            errEl.textContent = '⚠️ Completa todos los campos.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Iniciando sesión...';

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();

                // Guardar token y datos
                localStorage.setItem('token',  data.token);
                localStorage.setItem('rol',    data.rol);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('email',  email);

                // ✅ Guardar objeto usuario completo (con id) para el index.html
                localStorage.setItem('usuario', JSON.stringify({
                    id:     data.id,
                    nombre: data.nombre,
                    email:  email,
                    rol:    data.rol
                }));

                sucEl.textContent = `✅ ¡Bienvenido, ${data.nombre}! Redirigiendo...`;
                sucEl.style.display = 'block';

                setTimeout(() => redirigirSegunRol(data.rol), 800);

            } else if (res.status === 401) {
                errEl.textContent = '❌ Correo o contraseña incorrectos.';
                errEl.style.display = 'block';
            } else {
                errEl.textContent = '❌ Error del servidor. Intenta de nuevo.';
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = '❌ No se pudo conectar al servidor. ¿Está corriendo el backend?';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Iniciar Sesión';
        }
    }

    async function registrarse() {
        const nombre   = document.getElementById('regNombre').value.trim();
        const email    = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const errEl    = document.getElementById('regError');
        const sucEl    = document.getElementById('regSuccess');
        const btn      = document.getElementById('btnRegistro');
        errEl.style.display = 'none';
        sucEl.style.display = 'none';

        if (!nombre || !email || !password) {
            errEl.textContent = '⚠️ Completa todos los campos.';
            errEl.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            errEl.textContent = '⚠️ La contraseña debe tener mínimo 6 caracteres.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creando cuenta...';

        try {
            const res = await fetch(`${API}/usuarios/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, email, password, rol: 'CLIENTE' })
            });

            if (res.ok) {
                sucEl.textContent = '✅ ¡Cuenta creada! Iniciando sesión...';
                sucEl.style.display = 'block';
                // Auto-login
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = password;
                setTimeout(async () => {
                    cambiarTab('login', document.querySelector('.tab-btn'));
                    await iniciarSesion();
                }, 1200);
            } else {
                const txt = await res.text();
                errEl.textContent = txt.includes('registrado')
                    ? '❌ Este correo ya está registrado.'
                    : '❌ Error al crear cuenta.';
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = '❌ Error de conexión.';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Crear Cuenta';
        }
    }

    function redirigirSegunRol(rol) {
        const rutas = {
            'ADMIN':         '/admin.html',
            'FARMACEUTICO':  '/farmaceutico.html',
            'DELIVERY':      '/delivery.html',
            'CLIENTE':       '/index.html'
        };
        window.location.href = rutas[rol] || '/index.html';
    }
</script>
</body>
</html>
