<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotiClic - Iniciar Sesión</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 45px 40px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 { font-size: 30px; color: #1b5e20; font-weight: 700; }
        .logo p { color: #888; font-size: 14px; margin-top: 4px; }
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            color: #888;
            transition: all 0.2s;
        }
        .tab-btn.activo {
            background: white;
            color: #1b5e20;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .form-section { display: none; }
        .form-section.activo { display: block; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #2e7d32; }
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary:hover { background: #1b5e20; }
        .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
        .error-box {
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .success-box {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .volver {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .volver a { color: #2e7d32; font-weight: 600; text-decoration: none; }
        .volver a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <h1>💊 BotiClic</h1>
        <p>Tu farmacia digital de confianza</p>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn activo" onclick="cambiarTab('login', this)">Iniciar Sesión</button>
        <button class="tab-btn" onclick="cambiarTab('registro', this)">Crear Cuenta</button>
    </div>

    <!-- LOGIN -->
    <div class="form-section activo" id="secLogin">
        <div class="error-box" id="loginError"></div>
        <div class="success-box" id="loginSuccess"></div>
        <label>Correo electrónico</label>
        <input type="email" id="loginEmail" placeholder="tu@email.com"
               onkeypress="if(event.key==='Enter') iniciarSesion()">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" placeholder="••••••••"
               onkeypress="if(event.key==='Enter') iniciarSesion()">
        <button class="btn-primary" id="btnLogin" onclick="iniciarSesion()">
            Iniciar Sesión
        </button>
    </div>

    <!-- REGISTRO -->
    <div class="form-section" id="secRegistro">
        <div class="error-box" id="regError"></div>
        <div class="success-box" id="regSuccess"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
                <label>Tipo de documento</label>
                <select id="regTipoDoc" style="width:100%;padding:11px 12px;margin-bottom:14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;">
                    <option value="DNI">DNI</option>
                    <option value="CE">Carnet de Extranjería</option>
                    <option value="PASAPORTE">Pasaporte</option>
                </select>
            </div>
            <div>
                <label>Número de documento</label>
                <input type="text" id="regNumDoc" placeholder="Ingresa tu DNI" maxlength="12">
            </div>
        </div>

        <label>Nombres</label>
        <input type="text" id="regNombre" placeholder="José Leonardo">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
                <label>Apellido paterno</label>
                <input type="text" id="regApellidoP" placeholder="Rosales">
            </div>
            <div>
                <label>Apellido materno</label>
                <input type="text" id="regApellidoM" placeholder="Gutiérrez">
            </div>
        </div>

        <label>Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="tu@email.com">

        <label>Celular</label>
        <input type="tel" id="regCelular" placeholder="999 888 777" maxlength="9">

        <label>Fecha de nacimiento <span style="color:#aaa;font-weight:400;text-transform:none;font-size:11px;">(Opcional)</span></label>
        <div style="display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:8px;margin-bottom:14px;">
            <input type="text" id="regDia"  placeholder="DD"   maxlength="2" style="text-align:center;margin-bottom:0;">
            <input type="text" id="regMes"  placeholder="MM"   maxlength="2" style="text-align:center;margin-bottom:0;">
            <input type="text" id="regAnio" placeholder="AAAA" maxlength="4" style="text-align:center;margin-bottom:0;">
        </div>

        <label>Género <span style="color:#aaa;font-weight:400;text-transform:none;font-size:11px;">(Opcional)</span></label>
        <select id="regGenero" style="width:100%;padding:11px 12px;margin-bottom:14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;">
            <option value="">Selecciona tu género</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
            <option value="O">Prefiero no decir</option>
        </select>

        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres">

        <div style="display:flex;align-items:flex-start;gap:9px;margin-bottom:16px;font-size:13px;color:#555;">
            <input type="checkbox" id="regTerminos" style="width:auto;margin-top:2px;flex-shrink:0;">
            <label for="regTerminos" style="text-transform:none;letter-spacing:0;font-weight:400;margin-bottom:0;cursor:pointer;font-size:12px;color:#666;">
                He leído y acepto los <a href="#" style="color:#2e7d32;font-weight:600;">Términos y condiciones</a> y las <a href="#" style="color:#2e7d32;font-weight:600;">Políticas de Privacidad</a>.
            </label>
        </div>

        <button class="btn-primary" id="btnRegistro" onclick="registrarse()">
            Crear Cuenta
        </button>
    </div>

    <div class="volver">
        <a href="/index.html">← Volver a la tienda</a>
    </div>
</div>

<script>
    const API = 'http://localhost:8081/api';

    // Si ya hay sesión activa, redirigir
    window.onload = function() {
        const token = localStorage.getItem('token');
        const rol   = localStorage.getItem('rol');
        const usuario = localStorage.getItem('usuario');
        if (token) {
            const rolReal = rol || (usuario ? JSON.parse(usuario).rol : null);
            if (rolReal) redirigirSegunRol(rolReal);
        }
    };

    function cambiarTab(tab, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('activo'));
        btn.classList.add('activo');
        document.getElementById(tab === 'login' ? 'secLogin' : 'secRegistro').classList.add('activo');
    }

    async function iniciarSesion() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errEl    = document.getElementById('loginError');
        const sucEl    = document.getElementById('loginSuccess');
        const btn      = document.getElementById('btnLogin');
        errEl.style.display = 'none';
        sucEl.style.display = 'none';

        if (!email || !password) {
            errEl.textContent = '⚠️ Completa todos los campos.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Iniciando sesión...';

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();

                // Guardar token y datos
                localStorage.setItem('token',  data.token);
                localStorage.setItem('rol',    data.rol);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('email',  email);

                // ✅ Guardar objeto usuario completo (con id) para el index.html
                localStorage.setItem('usuario', JSON.stringify({
                    id:     data.id,
                    nombre: data.nombre,
                    email:  email,
                    rol:    data.rol
                }));

                sucEl.textContent = `✅ ¡Bienvenido, ${data.nombre}! Redirigiendo...`;
                sucEl.style.display = 'block';

                setTimeout(() => redirigirSegunRol(data.rol), 800);

            } else if (res.status === 401 || res.status === 403) {
                try {
                    const data = await res.json();
                    errEl.textContent = '❌ ' + (data.error || 'Correo o contraseña incorrectos.');
                } catch {
                    errEl.textContent = '❌ Correo o contraseña incorrectos.';
                }
                errEl.style.display = 'block';
            } else {
                errEl.textContent = '❌ Error del servidor. Intenta de nuevo.';
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = '❌ No se pudo conectar al servidor. ¿Está corriendo el backend?';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Iniciar Sesión';
        }
    }

    async function registrarse() {
        const tipoDoc   = document.getElementById('regTipoDoc').value;
        const numDoc    = document.getElementById('regNumDoc').value.trim();
        const nombre    = document.getElementById('regNombre').value.trim();
        const apellidoP = document.getElementById('regApellidoP').value.trim();
        const apellidoM = document.getElementById('regApellidoM').value.trim();
        const email     = document.getElementById('regEmail').value.trim();
        const celular   = document.getElementById('regCelular').value.trim();
        const dia       = document.getElementById('regDia').value.trim();
        const mes       = document.getElementById('regMes').value.trim();
        const anio      = document.getElementById('regAnio').value.trim();
        const genero    = document.getElementById('regGenero').value;
        const password  = document.getElementById('regPassword').value;
        const terminos  = document.getElementById('regTerminos').checked;
        const errEl     = document.getElementById('regError');
        const sucEl     = document.getElementById('regSuccess');
        const btn       = document.getElementById('btnRegistro');
        errEl.style.display = 'none'; sucEl.style.display = 'none';

        if (!numDoc)    { errEl.textContent = '⚠️ Ingresa tu número de documento.'; errEl.style.display = 'block'; return; }
        if (!nombre)    { errEl.textContent = '⚠️ Ingresa tu nombre.'; errEl.style.display = 'block'; return; }
        if (!apellidoP) { errEl.textContent = '⚠️ Ingresa tu apellido paterno.'; errEl.style.display = 'block'; return; }
        if (!apellidoM) { errEl.textContent = '⚠️ Ingresa tu apellido materno.'; errEl.style.display = 'block'; return; }
        if (!email)     { errEl.textContent = '⚠️ Ingresa tu correo electrónico.'; errEl.style.display = 'block'; return; }
        if (!celular)   { errEl.textContent = '⚠️ Ingresa tu número de celular.'; errEl.style.display = 'block'; return; }
        if (!password || password.length < 6) { errEl.textContent = '⚠️ La contraseña debe tener mínimo 6 caracteres.'; errEl.style.display = 'block'; return; }
        if (!terminos)  { errEl.textContent = '⚠️ Debes aceptar los términos y condiciones.'; errEl.style.display = 'block'; return; }

        const nombreCompleto = `${nombre} ${apellidoP} ${apellidoM}`.trim();
        let fechaNacimiento = null;
        if (dia && mes && anio && anio.length === 4) {
            fechaNacimiento = `${anio}-${mes.padStart(2,'0')}-${dia.padStart(2,'0')}`;
        }

        btn.disabled = true; btn.textContent = 'Creando cuenta...';

        try {
            const res = await fetch(`${API}/usuarios/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nombre: nombreCompleto,
                    email, password,
                    rol: 'CLIENTE',
                    tipoDocumento: tipoDoc,
                    numeroDocumento: numDoc,
                    celular,
                    fechaNacimiento,
                    genero: genero || null
                })
            });

            if (res.ok) {
                sucEl.textContent = '✅ ¡Cuenta creada! Iniciando sesión...';
                sucEl.style.display = 'block';
                document.getElementById('loginEmail').value = email;
                document.getElementById('loginPassword').value = password;
                setTimeout(async () => {
                    cambiarTab('login', document.querySelector('.tab-btn'));
                    await iniciarSesion();
                }, 1200);
            } else {
                const txt = await res.text();
                errEl.textContent = txt.includes('registrado')
                    ? '❌ Este correo ya está registrado.'
                    : '❌ Error al crear cuenta.';
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = '❌ Error de conexión.';
            errEl.style.display = 'block';
        } finally {
            btn.disabled = false; btn.textContent = 'Crear Cuenta';
        }
    }

    function redirigirSegunRol(rol) {
        const rutas = {
            'ADMIN':         '/admin.html',
            'FARMACEUTICO':  '/farmaceutico.html',
            'DELIVERY':      '/delivery.html',
            'CLIENTE':       '/index.html'
        };
        window.location.href = rutas[rol] || '/index.html';
    }
</script>
</body>
</html>
