<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotiClic - Iniciar Sesión</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #283593 50%, #1565c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #1a237e;
            font-weight: bold;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #1a237e;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #283593;
        }

        .btn-login:disabled {
            background: #9e9e9e;
            cursor: not-allowed;
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            display: none;
        }

        .loading {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .volver {
            text-align: center;
            margin-top: 20px;
        }

        .volver a {
            color: #1a237e;
            text-decoration: none;
            font-size: 14px;
        }

        .volver a:hover {
            text-decoration: underline;
        }

        /* Indicador de rol */
        .rol-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">
        <h1>💊 BotiClic</h1>
        <p>Farmacia Digital</p>
    </div>

    <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@email.com" />
    </div>

    <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••"
               onkeypress="if(event.key==='Enter') login()" />
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">
        Iniciar Sesión
    </button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="loading" id="loading">⏳ Verificando credenciales...</div>

    <div class="volver">
        <a href="/index.html">← Volver a la tienda</a>
    </div>
</div>

<script>
    const API = 'http://localhost:8081/api';

    // Si ya hay sesión activa, redirigir directamente
    window.onload = function() {
        const token = localStorage.getItem('token');
        const rol   = localStorage.getItem('rol');
        if (token && rol) {
            redirigirSegunRol(rol);
        }
    };

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btnLogin = document.getElementById('btnLogin');
        const errorMsg = document.getElementById('errorMsg');
        const loading  = document.getElementById('loading');

        // Validar campos
        if (!email || !password) {
            mostrarError('Por favor ingresa tu correo y contraseña.');
            return;
        }

        // Mostrar cargando
        btnLogin.disabled = true;
        btnLogin.textContent = 'Iniciando sesión...';
        loading.style.display = 'block';
        errorMsg.style.display = 'none';

        try {
            const response = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();

                // Guardar token y datos en localStorage
                localStorage.setItem('token',  data.token);
                localStorage.setItem('rol',    data.rol);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('email',  email);

                // Redirigir según el rol
                redirigirSegunRol(data.rol);

            } else if (response.status === 401) {
                mostrarError('Correo o contraseña incorrectos.');
            } else {
                mostrarError('Error del servidor. Intenta de nuevo.');
            }

        } catch (error) {
            mostrarError('No se pudo conectar al servidor. ¿Está corriendo el backend?');
        } finally {
            btnLogin.disabled = false;
            btnLogin.textContent = 'Iniciar Sesión';
            loading.style.display = 'none';
        }
    }

    function redirigirSegunRol(rol) {
        switch (rol) {
            case 'ADMIN':
                window.location.href = '/admin.html';
                break;
            case 'FARMACEUTICO':
                window.location.href = '/farmaceutico.html';
                break;
            case 'DELIVERY':
                window.location.href = '/delivery.html';
                break;
            case 'CLIENTE':
            default:
                window.location.href = '/index.html';
                break;
        }
    }

    function mostrarError(mensaje) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = mensaje;
        errorMsg.style.display = 'block';
    }
</script>

</body>
</html>
