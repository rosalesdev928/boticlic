spring.application.name=boticlic
spring.datasource.url=jdbc:mysql://localhost:3306/boticlic?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081

# Soporte archivos recetas (máx 10MB)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=${JWT_SECRET:boticlic-clave-local-desarrollo-2026-no-usar-en-produccion}
jwt.expiracion=28800000

# Carpeta imágenes de productos (fuera del proyecto)
app.upload.dir=C:/boticlic-uploads/productos

# ✅ GMAIL — configuración de correo
# IMPORTANTE: no uses tu contraseña normal de Gmail.
# Debes crear una "Contraseña de aplicación":
#   1. Ve a: myaccount.google.com/security
#   2. Activa "Verificación en 2 pasos" (si no la tienes)
#   3. Busca "Contraseñas de aplicaciones"
#   4. Crea una nueva → te da una clave de 16 letras
#   5. Pega esa clave en GMAIL_APP_PASSWORD abajo
#
# En IntelliJ: Run > Edit Configurations > Environment Variables
#   Agrega: GMAIL_APP_PASSWORD=xxxx xxxx xxxx xxxx
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=leonardo1234rag@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true